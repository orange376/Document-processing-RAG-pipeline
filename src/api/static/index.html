<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Pipeline</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>RAG Pipeline</h1>
      <span class="version">v0.1</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="workspace">
        <span class="nav-icon">&#9881;</span>
        <span>工作台</span>
      </button>
      <button class="nav-item" data-tab="review">
        <span class="nav-icon">&#9989;</span>
        <span>审核</span>
        <span class="nav-badge" id="review-badge" style="display:none">0</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="health-dot" id="health-dot"></div>
      <span id="health-text">检查中...</span>
    </div>
  </aside>

  <main class="main">
    <!-- Workspace: upload + chat -->
    <section class="tab-content active" id="tab-workspace">
      <!-- Upload area -->
      <div class="ws-upload">
        <div class="upload-zone" id="upload-zone">
          <div class="upload-icon">&#128206;</div>
          <p>拖拽文件到此处，或点击选择</p>
          <p class="upload-hint">支持 PDF、DOCX</p>
          <input type="file" id="file-input" accept=".pdf,.docx,.doc" hidden>
          <button class="btn btn-primary" id="select-btn">选择文件</button>
        </div>
        <div class="upload-progress" id="upload-progress" style="display:none">
          <div class="upload-file-info" id="upload-file-info"></div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <p class="progress-text" id="progress-text">处理中...</p>
        </div>
        <div class="upload-result" id="upload-result" style="display:none"></div>
        <div class="upload-history" id="upload-history">
          <div class="history-list" id="upload-history-list"></div>
        </div>
      </div>

      <!-- Divider -->
      <div class="ws-divider"></div>

      <!-- Chat area -->
      <div class="ws-chat">
        <div class="chat-messages" id="chat-messages">
          <div class="message bot"><div class="msg-content">上传文档后可开始提问。</div></div>
        </div>
        <div class="chat-input-bar">
          <input type="text" id="chat-input" placeholder="输入问题..." autocomplete="off">
          <button class="btn btn-primary" id="chat-send">发送</button>
        </div>
      </div>
    </section>

    <!-- Review tab -->
    <section class="tab-content" id="tab-review">
      <div class="tab-header"><h2>&#9989; 待审核</h2></div>
      <div class="review-empty" id="review-empty"><p>&#128226; 暂无待审核项</p></div>
      <div class="review-list" id="review-list" style="display:none"></div>
    </section>
  </main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
