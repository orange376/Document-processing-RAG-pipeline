<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Pipeline — 智能文档问答</title>
  <link rel="stylesheet" href="/static/style.css?v=3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap');
  </style>
</head>
<body>

<!-- ════════════════════ APP SHELL ════════════════════ -->
<div id="app">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">RAG Pipeline</span>
        <span class="brand-ver">v0.2</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="workspace">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>工作台</span>
      </button>
      <button class="nav-item" data-tab="documents">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>文档</span>
        <span class="nav-badge" id="doc-badge" style="display:none">0</span>
      </button>
      <button class="nav-item" data-tab="review">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span>审核</span>
        <span class="nav-badge" id="review-badge" style="display:none">0</span>
      </button>
    </nav>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-footer">
      <div class="health-indicator" id="health-indicator">
        <span class="health-dot" id="health-dot"></span>
        <span class="health-text" id="health-text">检查中…</span>
      </div>
    </div>
  </aside>

  <!-- ─── Main ─── -->
  <main class="main">

    <!-- ════ Workspace ════ -->
    <section class="tab-content active" id="tab-workspace">
      <div class="workspace-layout">

        <!-- Left: Upload -->
        <div class="ws-panel ws-upload-panel">
          <div class="panel-header">
            <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>上传文档</h2>
          </div>

          <div class="upload-zone" id="upload-zone">
            <div class="upload-zone-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="12"/><line x1="15" y1="15" x2="12" y2="12"/>
              </svg>
            </div>
            <p class="upload-zone-title">拖拽文件到此处，或点击上传</p>
            <p class="upload-zone-hint">支持 PDF、DOCX 格式</p>
            <input type="file" id="file-input" accept=".pdf,.docx,.doc" hidden>
            <button class="btn btn-primary" id="select-btn">选择文件</button>
          </div>

          <!-- Upload progress -->
          <div class="upload-progress" id="upload-progress" style="display:none">
            <div class="up-header">
              <span class="up-filename" id="up-filename"></span>
              <button class="btn-icon" id="up-cancel" title="取消">✕</button>
            </div>
            <div class="up-bar-track">
              <div class="up-bar-fill" id="up-bar-fill"></div>
            </div>
            <div class="up-steps">
              <span class="up-step" data-step="upload">上传</span>
              <span class="up-step" data-step="process">处理</span>
              <span class="up-step" data-step="index">索引</span>
              <span class="up-step" data-step="done">完成</span>
            </div>
            <p class="up-status" id="up-status">上传中…</p>
          </div>

          <!-- Upload result toast -->
          <div class="upload-toast" id="upload-toast" style="display:none"></div>

          <!-- Recent uploads -->
          <div class="upload-history" id="upload-history">
            <div class="panel-subheader">
              <span>最近上传</span>
              <button class="btn-link" id="history-clear">清空</button>
            </div>
            <div class="history-list" id="upload-history-list">
              <div class="history-empty">暂无上传记录</div>
            </div>
          </div>
        </div>

        <!-- Right: Chat -->
        <div class="ws-panel ws-chat-panel">
          <div class="panel-header">
            <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>智能问答</h2>
          </div>

          <div class="chat-messages" id="chat-messages">
            <div class="msg msg-system">
              <div class="msg-avatar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </div>
              <div class="msg-body">
                <div class="msg-sender">系统</div>
                <div class="msg-text">👋 欢迎使用 RAG Pipeline！上传文档后即可开始提问。</div>
              </div>
            </div>
          </div>

          <div class="chat-input-area">
            <div class="chat-input-wrap">
              <textarea id="chat-input" rows="1" placeholder="输入问题…" autocomplete="off"></textarea>
              <button class="btn-send" id="chat-send" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
            <p class="chat-hint">Enter 发送 · Shift+Enter 换行</p>
          </div>
        </div>

      </div>
    </section>

    <!-- ════ Documents ════ -->
    <section class="tab-content" id="tab-documents">
      <div class="page-header">
        <h2>文档库</h2>
        <span class="page-subtitle" id="doc-subtitle">管理已上传的文档</span>
      </div>
      <div class="doc-grid" id="doc-grid">
        <div class="doc-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>暂无文档，请先上传</p>
        </div>
      </div>
    </section>

    <!-- ════ Review ════ -->
    <section class="tab-content" id="tab-review">
      <div class="page-header">
        <h2>人工审核</h2>
        <span class="page-subtitle">置信度中等、需要人工确认的文档</span>
      </div>
      <div class="review-list" id="review-list">
        <div class="review-empty" id="review-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <p>暂无待审核项</p>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- 文档详情模态弹窗 -->
<div class="doc-detail-overlay" id="doc-detail-overlay"></div>

<script src="/static/app.js?v=3"></script>
</body>
</html>
